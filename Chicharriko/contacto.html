<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ABeeZee&family=Montserrat:wght@100..900&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>
<body>
<header>
    <nav class="navbar navbar-expand-lg" style="background-color: #faaf2a">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="./img/chicharrikos.webp" alt="Logo" width="30" height="26" />
                Chicharrikos Botanas
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="#">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="./nosotros.html">Nosotras</a></li>
                    <li class="nav-item"><a class="nav-link active">Contáctanos</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Catálogo</a></li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<main>
    <div class="container contact">
        <div class="row">
            <div class="col-md-3">
                <div class="contact-info">
                    <img src="https://image.ibb.co/kUASdV/contact-image.png" alt="image"/>
                    <h2>¡Contáctanos!</h2>
                    <h5>Llena los campos con tu información</h5>
                </div>
            </div>
            <div class="col-md-9">
                <div class="contact-form">
                    <form id="formulario">
                        <div class="mb-3">
                            <label for="fname" class="form-label">Nombre:</label>
                            <input type="text" class="form-control" id="fname" placeholder="Escribe tu nombre">
                        </div>
                        <div class="mb-3">
                            <label for="lname" class="form-label">Apellidos:</label>
                            <input type="text" class="form-control" id="lname" placeholder="Escribe tu apellido">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Correo Electrónico:</label>
                            <input type="email" class="form-control" id="email" placeholder="Escribe tu correo">
                        </div>
                        <div class="mb-3">
                            <label for="comment" class="form-label">Mensaje:</label>
                            <textarea class="form-control" rows="5" id="comment"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Enviar</button>
                        <div id="loadingMessage" style="display: none;">Enviando...</div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="footer">
    <div class="container">
        <p>© 2025 Chicharrikos Botanas. Todos los derechos reservados.</p>
    </div>
</footer>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
